<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>DKST Markdown Browser</title>
</head>

<body>
    <div id="app">
        <!-- Toolbar -->
        <header id="toolbar" class="toolbar">
            <div class="nav-group">
                <button id="btn-back" title="Back" aria-label="Back" class="nav-btn icon-btn" disabled>
                    <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
                </button>
                <button id="btn-forward" title="Forward" aria-label="Forward" class="nav-btn icon-btn" disabled>
                    <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
                </button>
                <button id="btn-home" title="Home" aria-label="Home" class="nav-btn icon-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">home</span>
                </button>
                <button id="btn-open" title="Open File" aria-label="Open File" class="nav-btn icon-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">folder_open</span>
                </button>
            </div>

            <div class="address-bar">
                <span id="current-path">DKST Markdown Browser</span>
            </div>

            <div class="action-group">
                <div class="render-toggle">
                    <select id="select-engine">
                        <option value="marked">Marked</option>
                        <option value="remark">Remark</option>
                    </select>
                </div>
                <button id="btn-info" title="Open Source Notices" aria-label="Open Source Notices" class="info-btn">
                    <span class="material-symbols-outlined info-btn-icon" aria-hidden="true">info</span>
                </button>
                <button id="btn-font-minus" title="Decrease Font Size" aria-label="Decrease Font Size" class="nav-btn icon-btn font-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">format_size</span>
                    <span class="font-adjust-label" aria-hidden="true">-</span>
                </button>
                <button id="btn-font-plus" title="Increase Font Size" aria-label="Increase Font Size" class="nav-btn icon-btn font-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">format_size</span>
                    <span class="font-adjust-label" aria-hidden="true">+</span>
                </button>
                <button id="btn-theme-toggle" title="Toggle Theme" aria-label="Toggle Theme" class="nav-btn icon-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
                </button>
                <button id="btn-search-toggle" title="Search" aria-label="Search" class="nav-btn icon-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">search</span>
                </button>
            </div>
        </header>

        <main id="main-container">
            <!-- Markdown Content -->
            <article id="content-view" class="content-view">
                <!-- Home Screen (Recent Files) -->
                <div id="home-screen" class="home-screen">
                    <h1>📝 DKST Markdown Browser</h1>
                    <p class="home-subtitle">Open or drag a Markdown file here.</p>
                    <div id="recent-files-list" class="recent-list">
                        <div class="empty-state">No recently opened files.</div>
                    </div>
                    <div class="recent-actions">
                        <button id="btn-open-home" class="action-btn primary">
                            <span class="material-symbols-outlined" aria-hidden="true">folder_open</span>
                            <span>Open File</span>
                        </button>
                        <button id="btn-clear-recent" class="action-btn secondary">
                            <span class="material-symbols-outlined" aria-hidden="true">delete</span>
                            <span>Clear Recent Files</span>
                        </button>
                    </div>
                </div>
                <div id="markdown-container" class="markdown-container hidden"></div>
            </article>

            <!-- Sidebar (Search) - on the RIGHT -->
            <aside id="search-sidebar" class="sidebar hidden">
                <div class="search-header">
                    <input type="text" id="search-input" placeholder="Search keyword..." />
                </div>
                <div id="search-results" class="search-results">
                    <div class="search-hint">Open a file then type to search.</div>
                </div>
            </aside>
        </main>

        <!-- Floating highlight navigator -->
        <div id="highlight-nav" class="highlight-nav hidden">
            <button id="btn-hl-prev" title="Previous">↑</button>
            <span id="hl-counter">1 / 1</span>
            <button id="btn-hl-next" title="Next">↓</button>
            <button id="btn-hl-close" title="Close">✕</button>
        </div>

        <!-- Toast message -->
        <div id="toast" class="toast"></div>
    </div>
    <script src="./src/main.js" type="module"></script>
</body>

</html>
