<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>DINKIssTyle Markdown Browser</title>
</head>
<body>
    <div id="app">
        <!-- Toolbar -->
        <header id="toolbar" class="toolbar">
            <div class="nav-group">
                <button id="btn-back" title="뒤로 (Back)" class="nav-btn" disabled>←</button>
                <button id="btn-forward" title="앞으로 (Forward)" class="nav-btn" disabled>→</button>
                <button id="btn-home" title="홈 (Home)" class="nav-btn">🏠</button>
                <button id="btn-open" title="파일 열기 (Open)" class="nav-btn">📂</button>
            </div>

            <div class="address-bar">
                <span id="current-path">DINKIssTyle Markdown Browser</span>
            </div>

            <div class="action-group">
                <div class="render-toggle">
                  <select id="select-engine">
                    <option value="marked">Marked</option>
                    <option value="remark">Remark</option>
                  </select>
                </div>
                <button id="btn-font-minus" title="폰트 작게" class="nav-btn font-btn">A-</button>
                <button id="btn-font-plus" title="폰트 크게" class="nav-btn font-btn">A+</button>
                <button id="btn-theme-toggle" title="테마 토글" class="nav-btn">🌓</button>
                <button id="btn-search-toggle" title="검색" class="nav-btn">🔍</button>
            </div>
        </header>

        <main id="main-container">
            <!-- Markdown Content -->
            <article id="content-view" class="content-view">
                <!-- Home Screen (Recent Files) -->
                <div id="home-screen" class="home-screen">
                    <h1>📝 DINKIssTyle Markdown Browser</h1>
                    <p class="home-subtitle">마크다운 파일을 열거나 드래그하세요.</p>
                    <div id="recent-files-list" class="recent-list">
                        <div class="empty-state">최근에 열거나 드래그한 파일이 없습니다.</div>
                    </div>
                    <div class="recent-actions">
                        <button id="btn-open-home" class="action-btn primary">📂 파일 열기</button>
                        <button id="btn-clear-recent" class="action-btn secondary">🗑 최근 목록 지우기</button>
                    </div>
                </div>
                <div id="markdown-container" class="markdown-container hidden"></div>
            </article>

            <!-- Sidebar (Search) - on the RIGHT -->
            <aside id="search-sidebar" class="sidebar hidden">
                <div class="search-header">
                    <input type="text" id="search-input" placeholder="내용 검색..." />
                    <button id="btn-search-folder" title="검색 폴더 선택" class="nav-btn">📁</button>
                </div>
                <div id="search-results" class="search-results">
                    <div class="search-hint">파일을 열거나 폴더를 선택하여 검색하세요.</div>
                </div>
            </aside>
        </main>
    </div>
    <script src="./src/main.js" type="module"></script>
</body>
</html>
