<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>DKST Markdown Browser</title>
</head>

<body>
    <div id="app">
        <!-- Toolbar -->
        <header id="toolbar" class="toolbar">
            <div class="nav-group">
                <button id="btn-back" title="Back" aria-label="Back" class="nav-btn icon-btn" disabled>
                    <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
                </button>
                <button id="btn-forward" title="Forward" aria-label="Forward" class="nav-btn icon-btn" disabled>
                    <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
                </button>
                <button id="btn-home" title="Home" aria-label="Home" class="nav-btn icon-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">home</span>
                </button>
                <button id="btn-refresh" title="Refresh" aria-label="Refresh" class="nav-btn icon-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
                </button>
                <button id="btn-open" title="Open File" aria-label="Open File" class="nav-btn icon-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">folder_open</span>
                </button>
            </div>

            <div class="address-bar">
                <span id="current-path">DKST Markdown Browser</span>
            </div>

            <div class="action-group">
                <div class="render-toggle">
                    <select id="select-engine">
                        <option value="marked">Marked</option>
                        <option value="remark">Remark</option>
                        <option value="html">HTML</option>
                    </select>
                </div>
                <button id="btn-edit" title="Edit Markdown" aria-label="Edit Markdown" class="nav-btn icon-btn" disabled>
                    <span class="material-symbols-outlined" aria-hidden="true">edit_note</span>
                </button>
                <button id="btn-info" title="Open Source Notices" aria-label="Open Source Notices" class="info-btn">
                    <span class="material-symbols-outlined info-btn-icon" aria-hidden="true">info</span>
                </button>
                <button id="btn-font-minus" title="Decrease Font Size" aria-label="Decrease Font Size" class="nav-btn icon-btn font-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">format_size</span>
                    <span class="font-adjust-label" aria-hidden="true">-</span>
                </button>
                <button id="btn-font-plus" title="Increase Font Size" aria-label="Increase Font Size" class="nav-btn icon-btn font-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">format_size</span>
                    <span class="font-adjust-label" aria-hidden="true">+</span>
                </button>
                <button id="btn-theme-toggle" title="Toggle Theme" aria-label="Toggle Theme" class="nav-btn icon-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
                </button>
                <button id="btn-search-toggle" title="Search" aria-label="Search" class="nav-btn icon-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">search</span>
                </button>
            </div>
        </header>

        <div id="tab-strip" class="tab-strip">
            <div id="tabs-list" class="tabs-list"></div>
            <button id="btn-new-tab" title="New Tab" aria-label="New Tab" class="tab-add-btn">
                <span class="material-symbols-outlined" aria-hidden="true">add</span>
            </button>
        </div>
        
        <div id="edit-toolbar" class="edit-toolbar hidden">
            <div class="edit-tool-group">
                <button id="ed-bold" title="Bold (**)" class="tool-btn"><span class="material-symbols-outlined">format_bold</span></button>
                <button id="ed-italic" title="Italic (*)" class="tool-btn"><span class="material-symbols-outlined">format_italic</span></button>
                <button id="ed-strike" title="Strikethrough (~~)" class="tool-btn"><span class="material-symbols-outlined">strikethrough_s</span></button>
                <button id="ed-quote" title="Blockquote (>)" class="tool-btn"><span class="material-symbols-outlined">format_quote</span></button>
            </div>
            <div class="edit-separator"></div>
            <div class="edit-tool-group">
                <button id="ed-h1" title="Heading 1 (#)" class="tool-btn">H1</button>
                <button id="ed-h2" title="Heading 2 (##)" class="tool-btn">H2</button>
                <button id="ed-h3" title="Heading 3 (###)" class="tool-btn">H3</button>
                <button id="ed-ul" title="Unordered List (•)" class="tool-btn"><span class="material-symbols-outlined">format_list_bulleted</span></button>
                <button id="ed-ol" title="Ordered List (1.)" class="tool-btn"><span class="material-symbols-outlined">format_list_numbered</span></button>
                <button id="ed-hr" title="Horizontal Rule (---)" class="tool-btn"><span class="material-symbols-outlined">horizontal_rule</span></button>
            </div>
            <div class="edit-separator"></div>
            <div class="edit-tool-group">
                <button id="ed-link" title="Link [title](url)" class="tool-btn"><span class="material-symbols-outlined">link</span></button>
                <button id="ed-image" title="Image ![alt](url)" class="tool-btn"><span class="material-symbols-outlined">image</span></button>
                <button id="ed-code" title="Code Block (```)" class="tool-btn"><span class="material-symbols-outlined">code</span></button>
                <button id="ed-table" title="Table" class="tool-btn"><span class="material-symbols-outlined">table_chart</span></button>
            </div>
            <div class="edit-separator"></div>
            <div class="edit-tool-group">
                <button id="ed-task" title="Task List (- [ ])" class="tool-btn"><span class="material-symbols-outlined">checklist</span></button>
                <button id="ed-latex" title="LaTeX ($/$$)" class="tool-btn"><span class="material-symbols-outlined">functions</span></button>
                <button id="ed-emoji" title="Emoji" class="tool-btn"><span class="material-symbols-outlined">mood</span></button>
            </div>
            <div class="spacer"></div>
            <div class="edit-tool-group">
                <button id="ed-cancel" title="Cancel" class="tool-btn cancel-btn"><span class="material-symbols-outlined">disabled_by_default</span></button>
                <button id="ed-save" title="Save" class="tool-btn save-btn"><span class="material-symbols-outlined">save</span></button>
            </div>
        </div>

        <main id="main-container">
            <!-- Markdown Content -->
            <article id="content-view" class="content-view">
                <!-- Home Screen (Recent Files) -->
                <div id="home-screen" class="home-screen">
                    <h1><span class="material-symbols-outlined home-title-icon" aria-hidden="true">markdown</span> <span>DKST Markdown Browser</span></h1>
                    <p class="home-subtitle">Open or drag a Markdown or HTML file here.</p>
                    <div id="recent-files-list" class="recent-list">
                        <div class="empty-state">
                            <span class="material-symbols-outlined empty-state-icon" aria-hidden="true">history</span>
                            <div class="empty-state-title">No recent documents yet</div>
                            <div class="empty-state-copy">Open a Markdown or HTML file and it will appear here for quick access.</div>
                        </div>
                    </div>
                    <div class="recent-actions">
                        <button id="btn-open-home" class="action-btn primary">
                            <span class="material-symbols-outlined" aria-hidden="true">folder_open</span>
                            <span>Open File</span>
                        </button>
                        <button id="btn-clear-recent" class="action-btn secondary">
                            <span class="material-symbols-outlined" aria-hidden="true">delete</span>
                            <span>Clear Recent Files</span>
                        </button>
                    </div>
                </div>
                <div id="markdown-container" class="markdown-container hidden"></div>
                <iframe id="html-frame" class="html-frame hidden" title="HTML Document Viewer"></iframe>
            </article>

            <article id="editor-view" class="editor-view hidden">
                <textarea id="markdown-editor" spellcheck="false" placeholder="Enter markdown content here..."></textarea>
            </article>

            <!-- Sidebar (Search) - on the RIGHT -->
            <aside id="search-sidebar" class="sidebar hidden">
                <div class="search-header">
                    <div class="search-input-wrap">
                        <input type="text" id="search-input" placeholder="Search keyword..." />
                        <button id="btn-clear-search" class="clear-search-btn hidden" type="button" aria-label="Clear search">
                            <span class="material-symbols-outlined" aria-hidden="true">close</span>
                        </button>
                    </div>
                </div>
                <label class="search-scope-option">
                    <input type="checkbox" id="search-open-tab-folders" />
                    <span>Search open tab folders too</span>
                </label>
                <div id="search-results" class="search-results">
                    <div class="search-hint">Open a file then type to search.</div>
                </div>
            </aside>
        </main>

        <!-- Floating highlight navigator -->
        <div id="highlight-nav" class="highlight-nav hidden">
            <button id="btn-hl-prev" title="Previous">↑</button>
            <span id="hl-counter">1 / 1</span>
            <button id="btn-hl-next" title="Next">↓</button>
            <button id="btn-hl-close" title="Close">✕</button>
        </div>

        <!-- Toast message -->
        <div id="toast" class="toast"></div>

        <div id="progress-widget" class="progress-widget hidden" aria-live="polite">
            <div class="progress-widget-header">
                <div class="progress-header-main">
                    <span id="progress-title" class="progress-title">Working…</span>
                    <span id="progress-value" class="progress-value"></span>
                </div>
                <button id="btn-progress-cancel" class="progress-cancel-btn" aria-label="Cancel Current Task" title="Cancel Current Task">
                    <span class="material-symbols-outlined" aria-hidden="true">close</span>
                </button>
            </div>
            <div class="progress-track">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div id="context-menu" class="context-menu hidden" role="menu" aria-hidden="true">
            <button id="context-copy" class="context-menu-item" type="button" role="menuitem">Copy</button>
            <button id="context-search" class="context-menu-item" type="button" role="menuitem">Search</button>
            <button id="context-open" class="context-menu-item" type="button" role="menuitem">Open</button>
            <button id="context-open-new-tab" class="context-menu-item" type="button" role="menuitem">Open In New Tab</button>
        </div>

        <!-- Custom Modal for Prompts -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div id="modal-content" class="modal-content">
                <h3 id="modal-title">Prompt</h3>
                <p id="modal-message"></p>
                <div id="modal-input-group" class="modal-input-group">
                    <input type="text" id="modal-input" />
                </div>
                <div id="modal-emoji-grid" class="modal-emoji-grid hidden"></div>
                <div class="modal-actions">
                    <button id="modal-btn-cancel" class="modal-btn secondary">Cancel</button>
                    <button id="modal-btn-ok" class="modal-btn primary">OK</button>
                </div>
            </div>
        </div>
    </div>
    <script src="./src/main.js" type="module"></script>
</body>

</html>
